# ==========================================
# CONFIGURATION DU SERVEUR
# ==========================================

# Port du serveur (par défaut 8080)
server.port=8080
  
  # Contexte de l'application (optionnel)
  # server.servlet.context-path=/gestion-etudiants
  
  # ==========================================
  # CONFIGURATION DES VUES JSP
  # ==========================================
  
  # Préfixe et suffixe pour les vues JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
  
  # Encodage des pages JSP
spring.mvc.view.content-type=text/html
server.servlet.jsp.encoding=UTF-8
  
  # ==========================================
  # CONFIGURATION DE LA BASE DE DONNÉES (MySQL)
  # ==========================================
  
  # Connexion MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_etudiants?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=etudiant_user
spring.datasource.password=CryptScol2000!
  
  # Driver MySQL (automatiquement détecté, mais on le précise)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
  
  # ==========================================
  # CONFIGURATION JPA/HIBERNATE
  # ==========================================
  
  # Afficher les requêtes SQL dans la console
spring.jpa.show-sql=true

# Format de date pour la conversion automatique
spring.mvc.format.date=yyyy-MM-dd
  
  # Formatage des requêtes SQL pour plus de lisibilité
spring.jpa.properties.hibernate.format_sql=true
  
  # Dialecte Hibernate pour MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
  
  # Stratégie de création des tables
spring.jpa.hibernate.ddl-auto=update
  
  # ==========================================
  # CONFIGURATION DE THYMELEAF (DÉSACTIVÉ POUR JSP)
  # ==========================================
  
  # Désactiver Thymeleaf (important avec JSP)
spring.thymeleaf.enabled=false
  
  # ==========================================
  # CONFIGURATION DES LOGS
  # ==========================================
  
  # Niveau de logs
logging.level.com.etudiant=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
  
  # ==========================================
  # CONFIGURATION DES FICHIERS STATIQUES (CSS, JS, Images)
  # ==========================================
  
  # Emplacement des ressources statiques
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/
  
  # ==========================================
  # CONFIGURATION MULTILINGUE (optionnel)
  # ==========================================
  
  # Fichiers de messages pour l'internationalisation
spring.messages.basename=message
spring.messages.encoding=UTF-8
  
  # ==========================================
  # AUTRES CONFIGURATIONS
  # ==========================================
  
  # Taille maximale des fichiers uploadés
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
  
  # Désactiver le cache pour le développement
spring.web.resources.cache.period=0